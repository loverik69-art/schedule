<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#1a6e42">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="My Schedule">
<title>My Schedule</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --g:#1a6e42;--gd:#124d2e;--gl:#e6f4ec;--gm:#2d9460;
  --or:#d4730a;--orl:#fff3e5;
  --bl:#2563a8;--bll:#e8f0fb;
  --rd:#b91c1c;--rdl:#fce8e8;
  --tx:#1c1c1e;--tx2:#6b7280;--tx3:#9ca3af;
  --bd:#e5e7eb;--bg:#f0f2f1;--card:#ffffff;
  --nav:78px;--hdr:65px;
}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--tx);overflow:hidden}
#app{display:flex;flex-direction:column;height:100%;max-width:480px;margin:0 auto;position:relative}

.hdr{background:linear-gradient(135deg,var(--gd),var(--g));color:#fff;height:var(--hdr);display:flex;align-items:center;justify-content:space-between;padding:0 16px;flex-shrink:0;box-shadow:0 2px 12px rgba(26,110,66,.3)}
.hdr-left{display:flex;align-items:center;gap:10px}
.hdr-icon{width:32px;height:32px;background:rgba(255,255,255,.2);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px}
.hdr h1{font-size:18px;font-weight:700;letter-spacing:.3px}
.hdr-right{display:flex;align-items:center;gap:8px}
.hdr-date{font-size:11px;background:rgba(255,255,255,.18);padding:4px 10px;border-radius:20px;font-weight:500}
.btn-logout{background:rgba(255,255,255,0.2);border:none;color:#fff;width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;transition:0.2s}
.btn-logout:active{transform:scale(0.9);background:rgba(255,255,255,0.4)}

.content{flex:1;overflow-y:auto;padding:12px 12px 0;-webkit-overflow-scrolling:touch}
.content-inner{padding-bottom:100px}

.nav{position:absolute;bottom:0;left:0;right:0;height:var(--nav);background:#fff;border-top:1px solid var(--bd);display:flex;padding-bottom:18px;z-index:50;box-shadow:0 -2px 12px rgba(0,0,0,.06)}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;border:none;background:none;color:var(--tx3);font-size:10px;font-weight:500;cursor:pointer;transition:color .15s;position:relative}
.nb.active{color:var(--g)}
.nb.active::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:28px;height:3px;background:var(--g);border-radius:3px 3px 0 0}
.nb svg{width:22px;height:22px;stroke-width:1.8}

.card{background:var(--card);border-radius:12px;margin-bottom:10px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.07),0 0 0 1px rgba(0,0,0,.04)}
.card-hdr{padding:12px 14px 8px;display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--tx2)}
.card-body{padding:0 14px 12px}

.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.kpi{background:var(--card);border-radius:12px;padding:14px 12px;box-shadow:0 2px 6px rgba(0,0,0,.06),0 0 0 1px rgba(0,0,0,.04);text-align:center;cursor:pointer;transition:all .2s cubic-bezier(.4,0,.2,1);position:relative;overflow:hidden}
.kpi:active{transform:scale(.96);box-shadow:0 1px 3px rgba(0,0,0,.08)}
.kpi::after{content:'';position:absolute;inset:0;background:#000;opacity:0;transition:.2s}
.kpi:active::after{opacity:.04}
.kpi.on{box-shadow:0 0 0 2px var(--g),0 4px 12px rgba(26,110,66,.15);transform:translateY(-2px)}
.kpi.on.warn{box-shadow:0 0 0 2px var(--or),0 4px 12px rgba(212,115,10,.15)}
.kpi.on.danger{box-shadow:0 0 0 2px var(--rd),0 4px 12px rgba(185,28,28,.15)}
.kpi.on.info{box-shadow:0 0 0 2px var(--bl),0 4px 12px rgba(37,99,168,.15)}
.kpi-v{font-size:28px;font-weight:800;line-height:1;color:var(--g)}
.kpi-l{font-size:10px;color:var(--tx2);margin-top:3px;font-weight:500}
.kpi.warn .kpi-v{color:var(--or)}
.kpi.danger .kpi-v{color:var(--rd)}
.kpi.info .kpi-v{color:var(--bl)}

.li{display:flex;align-items:center;padding:10px 14px;border-bottom:1px solid #f3f4f6;gap:10px;transition:background-color .2s}
.li:last-child{border-bottom:none}
.li[onclick]:active{background-color:var(--bll)}
.dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.dot-N{background:var(--g)}.dot-R{background:var(--or)}.dot-H{background:var(--bl)}.dot-U{background:var(--rd)}
.li-info{flex:1;min-width:0}
.li-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.li-sub{font-size:11px;color:var(--tx2);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;flex-shrink:0}
.badge-N{background:var(--gl);color:var(--g)}.badge-R{background:var(--orl);color:var(--or)}
.badge-H{background:var(--bll);color:var(--bl)}.badge-U{background:var(--rdl);color:var(--rd)}

.dr{display:flex;gap:8px;margin-bottom:12px;align-items:center}
.dr input[type=date]{flex:1;padding:10px 12px;border:1.5px solid var(--bd);border-radius:10px;font-size:14px;background:var(--card);color:var(--tx);-webkit-appearance:none}
.dr input[type=date]:focus{outline:none;border-color:var(--g)}
.btn-today{padding:10px 14px;background:var(--g);color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;flex-shrink:0}

.fg{margin-bottom:12px}
.fl{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--tx2);margin-bottom:5px}
select,input[type=text]{width:100%;padding:11px 12px;border:1.5px solid var(--bd);border-radius:10px;font-size:14px;background:var(--card);color:var(--tx);-webkit-appearance:none;appearance:none}
select:focus,input:focus{outline:none;border-color:var(--g)}
.date-range{display:flex;gap:6px;align-items:center}
.date-range input[type=date]{flex:1;padding:10px 12px;border:1.5px solid var(--bd);border-radius:10px;font-size:13px;background:var(--card);color:var(--tx);-webkit-appearance:none}
.date-range input[type=date]:focus{outline:none;border-color:var(--g)}
.date-range span{font-size:12px;color:var(--tx2);flex-shrink:0;font-weight:600}

.btn{width:100%;padding:13px;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;transition:opacity .15s}
.btn:active{opacity:.85}
.btn-p{background:var(--g);color:#fff}
.btn-d{background:var(--rd);color:#fff}
.btn-s{background:var(--gl);color:var(--g)}
.btn-b{background:var(--bll);color:var(--bl)}
.btn-sm{padding:6px 12px;font-size:12px;border:none;border-radius:8px;cursor:pointer;font-weight:600;width:auto}

.chips{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:10px;-webkit-overflow-scrolling:touch}
.chips::-webkit-scrollbar{display:none}
.chip{padding:6px 14px;border-radius:20px;border:1.5px solid var(--bd);background:var(--card);font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .15s}
.chip.on{background:var(--g);color:#fff;border-color:var(--g)}

.ai{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid #f3f4f6}
.ai:last-child{border-bottom:none}
.ai-name{font-size:13px;font-weight:600}
.ai-sub{font-size:11px;color:var(--tx2)}
.ai-badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;background:var(--orl);color:var(--or)}
.del{background:none;border:none;color:var(--tx3);font-size:20px;cursor:pointer;padding:2px 8px;line-height:1}
.edit-btn{background:var(--bll);border:none;color:var(--bl);font-size:11px;font-weight:600;padding:4px 10px;border-radius:6px;cursor:pointer;margin-right:4px}

.hi{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid #f3f4f6}
.hi:last-child{border-bottom:none}
.hi-date{font-size:11px;font-weight:700;color:var(--bl)}
.hi-school{font-size:12px;color:var(--tx);margin-top:1px}

.mi{padding:10px 14px;border-bottom:1px solid #f3f4f6}
.mi:last-child{border-bottom:none}
.mi-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:3px}
.mi-school{font-size:12px;font-weight:700}
.mi-teacher{font-size:11px;color:var(--g);font-weight:600;margin-bottom:4px}
.mi-txt{font-size:11px;color:var(--tx2);line-height:1.5;margin-bottom:6px}
.wa{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;background:#25D366;color:#fff;border-radius:8px;font-size:12px;font-weight:700;text-decoration:none}
.wa-group{display:flex;align-items:center;justify-content:center;gap:8px;padding:14px;background:#25D366;color:#fff;border-radius:12px;font-size:15px;font-weight:700;text-decoration:none;margin-bottom:12px;box-shadow:0 4px 12px rgba(37,211,102,.3)}

.set-item{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:1px solid #f3f4f6;cursor:pointer}
.set-item:last-child{border-bottom:none}
.set-lbl{font-size:14px;font-weight:500}
.set-sub{font-size:11px;color:var(--tx2);margin-top:1px}
.set-arr{color:var(--tx3);font-size:18px}

.empty{text-align:center;padding:28px 16px;color:var(--tx2)}
.empty-ico{font-size:36px;margin-bottom:8px}
.empty-txt{font-size:13px}

.sec{font-size:12px;font-weight:700;color:var(--tx2);text-transform:uppercase;letter-spacing:.8px;margin:14px 0 8px;padding:0 2px}

.alert{background:var(--orl);border-left:4px solid var(--or);border-radius:10px;padding:10px 12px;margin-bottom:10px}
.alert-ttl{font-size:11px;font-weight:700;color:var(--or);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.alert-txt{font-size:12px;color:var(--tx)}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;display:flex;align-items:flex-end;justify-content:center}
.modal{background:#fff;border-radius:20px 20px 0 0;padding:20px;width:100%;max-width:480px;max-height:85vh;overflow-y:auto}
.modal-title{font-size:16px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
.modal-close{background:none;border:none;font-size:22px;cursor:pointer;color:var(--tx2);line-height:1;padding:0}
.hidden{display:none!important}

.cov-bar{height:8px;background:#e5e7eb;border-radius:4px;overflow:hidden;margin-top:4px}
.cov-fill{height:100%;background:linear-gradient(90deg,var(--g),var(--gm));border-radius:4px;transition:width .4s ease}

.asn-item{padding:8px 14px;border-bottom:1px solid #f3f4f6;font-size:12px}
.asn-item:last-child{border-bottom:none}
.asn-school{font-weight:600;margin-bottom:1px}
.asn-teachers{color:var(--tx2);display:flex;align-items:center;justify-content:space-between}

.ver{font-size:10px;color:var(--tx3);text-align:center;padding:8px}

.import-area{border:2px dashed var(--bd);border-radius:10px;padding:16px;text-align:center;cursor:pointer;background:var(--bg);transition:border-color .2s}
.import-area:hover{border-color:var(--g)}
.import-area input{display:none}
.import-ico{font-size:28px;margin-bottom:6px}
.import-txt{font-size:12px;color:var(--tx2)}
.import-hint{font-size:10px;color:var(--tx3);margin-top:4px}

.bkp-item{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid #f3f4f6}
.bkp-item:last-child{border-bottom:none}
.bkp-name{font-size:13px;font-weight:600}
.bkp-date{font-size:11px;color:var(--tx2)}

.tab-btns{display:flex;gap:0;border-bottom:2px solid var(--bd);margin-bottom:12px}
.tab-btn{flex:1;padding:10px;background:none;border:none;font-size:12px;font-weight:600;color:var(--tx2);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px}
.tab-btn.on{color:var(--g);border-bottom-color:var(--g)}

.priority-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;background:#f3f4f6;color:var(--tx2)}
.priority-High{background:#fef3c7;color:#d97706}
.priority-Medium{background:#e0f2fe;color:#0369a1}
.priority-Low{background:var(--gl);color:var(--g)}

.search-box{width:100%;padding:10px 12px;border:1.5px solid var(--bd);border-radius:10px;font-size:14px;margin-bottom:10px;background:var(--card)}
.search-box:focus{outline:none;border-color:var(--g)}

.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid #f3f4f6}
.toggle-lbl{font-size:13px;font-weight:500}
.toggle{position:relative;width:44px;height:24px}
.toggle input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;cursor:pointer;inset:0;background:#d1d5db;border-radius:24px;transition:.2s}
.toggle-slider:before{content:'';position:absolute;width:18px;height:18px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s}
input:checked+.toggle-slider{background:var(--g)}
input:checked+.toggle-slider:before{transform:translateX(20px)}
</style>
</head>
<body>
<div id="app">
  <div class="hdr">
    <div class="hdr-left">
      <div class="hdr-icon">📅</div>
      <div>
        <h1 id="com-name">My Schedule</h1>
        <div id="com-addr" style="font-size:10px;opacity:0.8;margin-top:-2px"></div>
      </div>
    </div>
    <div class="hdr-date" id="hdr-date"></div>
  </div>
  <div class="content" id="content"><div class="content-inner" id="ci"></div></div>
  <nav class="nav">
    <button class="nb active" data-tab="dashboard" onclick="goTab('dashboard')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      Dashboard
    </button>
    <button class="nb" data-tab="status" onclick="goTab('status')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M9 12l2 2 4-4"/><circle cx="12" cy="12" r="9"/></svg>
      Leave
    </button>
    <button class="nb" data-tab="holidays" onclick="goTab('holidays')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
      Holidays
    </button>
    <button class="nb" data-tab="messages" onclick="goTab('messages')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      Messages
    </button>
    <button class="nb" data-tab="archive" onclick="goTab('archive')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 8V21H3V8M1 3H23V8H1V3ZM10 12H14"/></svg>
      Archive
    </button>
    <button class="nb" data-tab="settings" onclick="goTab('settings')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      Settings
    </button>
  </nav>
</div>

<!-- MODAL CONTAINER -->
<div id="modal-bg" class="modal-bg hidden" onclick="closeModal(event)">
  <div class="modal" id="modal-body" onclick="event.stopPropagation()"></div>
</div>

<!-- LOGIN OVERLAY -->
<div id="login-overlay" class="modal-bg hidden" style="z-index:200; background:linear-gradient(135deg, var(--gd), var(--g))">
  <div class="card" style="width:100%; max-width:320px; padding:30px 20px; text-align:center; box-shadow:0 20px 40px rgba(0,0,0,0.2); border-radius:20px; margin:auto">
    <div style="font-size:40px; margin-bottom:15px; cursor:pointer; user-select:none" onclick="triggerDevLogin()">🔐</div>
    <h2 style="margin-bottom:4px; color:var(--tx)">Admin Login</h2>
    <div id="first-setup-hint" style="display:none; background:var(--orl); border:1px solid var(--or); border-radius:8px; padding:8px 10px; margin-bottom:14px; font-size:11px; color:var(--or); font-weight:600">
      🆕 First Setup: use <b>admin / admin</b><br>Change password after login!
    </div>
    <div style="margin-bottom:16px"></div>
    <div class="fg" style="text-align:left">
      <label class="fl">Username</label>
      <input type="text" id="l-user" placeholder="Enter username" onkeyup="if(event.key==='Enter')doLogin()">
    </div>
    <div class="fg" style="text-align:left; position:relative">
      <label class="fl">Password</label>
      <input type="password" id="l-pass" placeholder="Enter password" style="width:100%; padding:11px 40px 11px 12px; border:1.5px solid var(--bd); border-radius:10px" onkeyup="if(event.key==='Enter')doLogin()">
      <span onclick="togglePass('l-pass')" style="position:absolute; right:12px; bottom:11px; cursor:pointer; font-size:18px; user-select:none">👁️</span>
    </div>
    <button class="btn btn-p" onclick="doLogin()" style="margin-top:10px">Login to App</button>
    <div id="l-err" style="color:var(--rd); font-size:12px; margin-top:10px; min-height:18px"></div>
  </div>
</div>
<script>
  // Show first-setup hint on login screen if needed
  (function() {
    if (localStorage.getItem('ms_first_setup') === '1') {
      var el = document.getElementById('first-setup-hint');
      if (el) el.style.display = 'block';
    }
  })();
</script>

function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function getDow(ds) {
  const [y,m,d] = ds.split('-').map(Number);
  return new Date(y, m-1, d).getDay();
}
function fmtLong(ds) {
  const [y,m,d] = ds.split('-').map(Number);
  const days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${days[new Date(y,m-1,d).getDay()]}, ${d} ${months[m-1]} ${y}`;
}
function fmtShort(ds) {
  const [y,m,d] = ds.split('-').map(Number);
  const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${d} ${months[m-1]}`;
}
function fmtRange(from, to) {
  if (!to || from === to) return fmtLong(from);
  return `${fmtShort(from)} – ${fmtLong(to)}`;
}
function inRange(ds, from, to) {
  if (!to || from === to) return ds === from;
  return ds >= from && ds <= to;
}

// ═══════════════════════════════════════════════════════════
// SCHEDULE ENGINE
// ═══════════════════════════════════════════════════════════
function calcSchedule(ds) {
  const abs = getAbs().filter(a => inRange(ds, a.dateFrom, a.dateTo || a.dateFrom || a.date));
  const hols = getHols();
  const teachers = getT();
  const assigns = getA();
  const schools = getSchools();
  const dow = getDow(ds);

  return schools.map(school => {
    if (dow === 6) return {school, type:'H', teacher:null, note:'Saturday'};
    if (dow === 0 && school.sunHol) return {school, type:'H', teacher:null, note:'Sunday'};
    const holMatch = hols.find(h => inRange(ds, h.dateFrom, h.dateTo || h.dateFrom || h.date) && (h.sid==='ALL'||h.sid===school.id));
    if (holMatch) return {school, type:'H', teacher:null, note:holMatch.label||'Holiday'};

    const asgn = assigns.find(a=>a.s===school.id);
    if (!asgn) return {school, type:'U', teacher:null, note:'No assignment'};

    const priAbs = abs.some(a=>a.tid===asgn.p);
    const bakAbs = abs.some(a=>a.tid===asgn.b);
    const bak2Abs = asgn.b2 ? abs.some(a=>a.tid===asgn.b2) : true;
    
    const pri = teachers.find(t=>t.id===asgn.p);
    const bak = teachers.find(t=>t.id===asgn.b);
    const bak2 = teachers.find(t=>t.id===asgn.b2);

    if (!priAbs && pri) return {school, type:'N', teacher:pri};
    if (!bakAbs && bak) return {school, type:'R', teacher:bak, note:'Replacement'};
    if (!bak2Abs && bak2) return {school, type:'R', teacher:bak2, note:'Backup 2'};
    return {school, type:'U', teacher:null, note:'All absent'};
  });
}

function kpi(sch) {
  return {
    total:sch.length,
    n:sch.filter(s=>s.type==='N').length,
    r:sch.filter(s=>s.type==='R').length,
    h:sch.filter(s=>s.type==='H').length,
    u:sch.filter(s=>s.type==='U').length,
  };
}

const typeLabel = {N:'NORMAL',R:'REPLACE',H:'HOLIDAY',U:'UNASSIGN'};

function renderArchive() {
  const com = getCom();
  const ayStart = com.ayStart;
  const ayEnd = com.ayEnd;
  const amStr = (typeof S.archiveMonth === 'string' && S.archiveMonth.includes('-')) ? S.archiveMonth : todayStr().substring(0, 7);
  const [selYear, selMonth] = amStr.split('-').map(Number);
  
  const daysInMonth = new Date(selYear, selMonth, 0).getDate();
  const days = [];
  
  for(let i=daysInMonth; i>=1; i--) {
    const ds = `${selYear}-${String(selMonth).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
    if (ds > todayStr() || ds < ayStart || ds > ayEnd) continue;
    const sch = calcSchedule(ds);
    const k = kpi(sch);
    const active = k.n + k.r;
    const possible = k.total - k.h;
    const pct = possible > 0 ? Math.round(active / possible * 100) : (k.total > 0 ? 0 : 100);
    days.push({ds, pct, k});
  }

  const allMonths = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const chips = [];
  let curr = new Date(ayStart.substring(0, 7) + '-01');
  const endDateObj = new Date(ayEnd.substring(0, 7) + '-01');
  
  while(curr <= endDateObj) {
    const y = curr.getFullYear();
    const m = curr.getMonth() + 1;
    const ym = `${y}-${String(m).padStart(2,'0')}`;
    chips.push({ym, l: allMonths[m-1], y: y});
    curr.setMonth(curr.getMonth() + 1);
  }

  return `
    <div class="card" style="margin-bottom:10px">
      <div class="card-body" style="padding:12px">
        <div style="font-size:12px; font-weight:700; color:var(--g); margin-bottom:12px">📅 Academic Year: ${ayStart} to ${ayEnd}</div>
        <div style="display:grid; grid-template-columns:repeat(4, 1fr); gap:6px">
          ${chips.map(c => `
            <button class="chip ${amStr===c.ym?'on':''}" style="margin:0; width:100%; text-align:center; padding:6px 2px" onclick="S.archiveMonth='${c.ym}';render()">
              <div style="font-size:11px">${c.l}</div>
              <div style="font-size:8px; opacity:0.7">${c.y}</div>
            </button>
          `).join('')}
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-hdr">
        <span class="card-title">📜 History — ${allMonths[selMonth-1]} ${selYear}</span>
        <span style="font-size:11px;color:var(--tx2)">${days.length} days</span>
      </div>

function renderMsgs() {

  // Organized Groups
  const groupSize = Math.ceil(active.length / S.groupCount);
  const groups = [];
  for(let i=0; i<S.groupCount; i++) {
    groups.push(active.slice(i*groupSize, (i+1)*groupSize));
  }

  return `
    <div class="dr">
      <input type="date" value="${S.msgDate}" onchange="S.msgDate=this.value;render()">

            ${(()=>{
              const gn = getGroupNames();
              const maxG = gn.length;
              if (maxG === 0) return '<option value="1">No groups set — add groups in Settings</option>';
              return Array.from({length: maxG}, (_,i) => {
                const n = i+1;
                const lbl = n === 1 ? '1 Group (All)' : `${n} Groups`;
                const sel = S.groupCount === n ? 'selected' : '';
                return `<option value="${n}" ${sel}>${lbl}</option>`;
              }).join('');

        </div>
        ${groups.map((g,i)=>{
          if(!g.length) return '';
          const gn = getGroupNames();
          const msg = `🏫 Sports Schedule (${gn[i+1]}) – ${fmtLong(S.msgDate)}\n\n`
            + g.map(s=>`✅ ${s.school.name}: ${s.teacher.name}`).join('\n')
            + '\n\n— My Schedule';
          return `<a class="wa-group" href="https://wa.me/?text=${encodeURIComponent(msg)}" target="_blank" style="margin-bottom:8px">📲 Send ${gn[i+1]} (${g.length} schools)</a>`;
        }).join('')}

    <div class="chips">

function createNewSession() {
  const label = document.getElementById('ns-label').value.trim();
  const start = document.getElementById('ns-start').value;
  const end = document.getElementById('ns-end').value;
  const clone = document.getElementById('ns-clone').checked;
  if (!label || !start || !end) { alert('Please fill all fields.'); return; }
  const id = 'sess_' + Date.now();
  const newList = getSessList();
  newList.push({ id, label, ayStart: start, ayEnd: end });
  sv('ms_sess_list', newList);
  if (clone) { sv(`ms_${id}_a`, getA()); }
  sv(`ms_${id}_com`, { name: getCom().name, address: getCom().address, ayStart: start, ayEnd: end });
  sv(`ms_${id}_abs`, []);
  sv(`ms_${id}_hols`, []);
  if (confirm(`Session "${label}" created. Switch to it now?`)) { switchSession(id); } else { render(); }
}

function switchSession(id) {
  S.activeSess = id;
  sv('ms_active_sess', id);
  G_COM = null;
  const sess = getSessList().find(s => s.id === id);
  if (sess) { S.date = sess.ayStart; S.archiveMonth = sess.ayStart.substring(0, 7); }
  alert('🔄 Switched to session: ' + (sess?.label || id));
  render();
}

function deleteSession(id) {
  if (id === 'default') return;
  if (!confirm('Are you sure you want to delete this session and ALL its records?')) return;
  const newList = getSessList().filter(s => s.id !== id);
  sv('ms_sess_list', newList);
  localStorage.removeItem(`ms_${id}_a`);
  localStorage.removeItem(`ms_${id}_abs`);
  localStorage.removeItem(`ms_${id}_hols`);
  localStorage.removeItem(`ms_${id}_com`);
  if (S.activeSess === id) switchSession('default'); else render();
}

  const loc = document.getElementById('nt-loc').value.trim();

  const teachers = getT();
  const maxId = teachers.reduce((m,t)=>{ const n=parseInt(t.id.replace('T',''));return n>m?n:m; },0);

function importTeachers(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const wb = XLSX.read(e.target.result, {type:'array'});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const data = XLSX.utils.sheet_to_json(ws);
      if (!data.length) { alert('No data found in file.'); return; }
      // Accept: Name/name, Mobile/mobile/Phone/phone
      const teachers = getT();
      const maxId = teachers.reduce((m,t)=>{ const n=parseInt(t.id.replace('T',''));return n>m?n:m; },0);
      let added = 0, skipped = 0;
      data.forEach((row, i) => {
        const name = (row.Name||row.name||row.NAME||'').toString().trim();
        const mob = (row.Mobile||row.mobile||row.Phone||row.phone||row.MOBILE||'').toString().trim().replace(/\+977/g,'');
        const email = (row.Email||row.email||'').toString().trim();
        const loc = (row.Location||row.location||'').toString().trim();
        if (!name) { skipped++; return; }
        if (teachers.find(t=>t.name.toLowerCase()===name.toLowerCase())) { skipped++; return; }
        const newId = 'T' + String(maxId+added+1).padStart(3,'0');
        teachers.push({id:newId, name, mobile:mob||'N/A', email, location:loc});
        added++;
      });
      sv('ms_t', teachers);
      alert(`✅ Import complete!\nAdded: ${added} teachers\nSkipped: ${skipped} (duplicates or empty)`);
      render();
    } catch(err) {
      alert('Error reading file: ' + err.message);
    }
  };
  reader.readAsArrayBuffer(file);
  input.value = '';
}

function importSchools(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const wb = XLSX.read(e.target.result, {type:'array'});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const data = XLSX.utils.sheet_to_json(ws);
      if (!data.length) { alert('No data found in file.'); return; }
      const schools = getSchools();
      const maxId = schools.reduce((m,s)=>{ const n=parseInt(s.id.replace('S',''));return n>m?n:m; },0);
      let added = 0, skipped = 0;
      data.forEach((row) => {
        const name = (row.Name||row.name||row.NAME||row['School Name']||row['school name']||'').toString().trim();
        const priority = (row.Priority||row.priority||'Medium').toString().trim();
        const loc = (row.Location||row.location||'').toString().trim();
        const email = (row.Email||row.email||'').toString().trim();
        const grp = parseInt(row.Group||row.group||1);
        const sunHolRaw = (row.SundayHoliday||row['Sunday Holiday']||row.sunhol||'yes').toString().trim().toLowerCase();
        const sunHol = sunHolRaw==='yes'||sunHolRaw==='true'||sunHolRaw==='1';
        if (!name) { skipped++; return; }
        if (schools.find(s=>s.name.toLowerCase()===name.toLowerCase())) { skipped++; return; }
        const validPriority = ['High','Medium','Low'].includes(priority) ? priority : 'Medium';
        const newId = 'S' + String(maxId+added+1).padStart(3,'0');
        schools.push({id:newId, name, sunHol, priority:validPriority, location:loc, email, group:grp});
        added++;
      });
      sv('ms_schools', schools);
      alert(`✅ Import complete!\nAdded: ${added} schools\nSkipped: ${skipped} (duplicates or empty)`);
      render();
    } catch(err) {
      alert('Error reading file: ' + err.message);
    }
  };
  reader.readAsArrayBuffer(file);
  input.value = '';
}

function importXLSX(input) {
  const file = input.files[0];
  if (!file) return;
  if (!confirm('⚠️ This will OVERWRITE all current data.\n\nContinue?')) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const wb = XLSX.read(e.target.result, {type:'array'});
      const getS = (n) => wb.Sheets[n] ? XLSX.utils.sheet_to_json(wb.Sheets[n]) : null;
      
      let schools = getS('Schools');
      let teachers = getS('Teachers');
      let assigns = getS('Assignments');
      let absences = getS('Absences');
      let holidays = getS('Holidays');
      const company = getS('Company');

      // 1. Schools normalization
      if (schools) {
        schools = schools.map((s,i) => ({
          id: s.id || ('S' + String(i+1).padStart(3,'0')),
          name: s.name || s['School Name'] || 'Unnamed School',
          priority: s.priority || s.Priority || 'Medium',
          sunHol: s.sunHol === true || s['Sunday Holiday'] === 'yes' || s['Sunday Holiday'] === true,
          location: s.location || s.Location || '',
          email: s.email || s.Email || '',
          group: parseInt(s.group || s.Group || 1)
        }));
        sv('ms_schools', schools);
      }
      
      // 2. Teachers normalization
      if (teachers) {
        teachers = teachers.map((t,i) => ({
          id: t.id || ('T' + String(i+1).padStart(3,'0')),
          name: t.name || t['Teacher Name'] || 'Unnamed Teacher',
          mobile: (t.mobile || t.Mobile || '').toString(),
          email: t.email || t.Email || '',
          location: t.location || t.Location || ''
        }));
        sv('ms_t', teachers);
      }

      // 3. Assignments resolution
      if (assigns && schools && teachers) {
        const finalAssigns = assigns.map(a => {
          const sName = a.s || a['School Name'];
          const pName = a.p || a['Primary Teacher'] || a['Primary'];
          const b1Name = a.b || a['Backup Teacher 1'] || a['Backup 1'];
          const b2Name = a.b2 || a['Backup Teacher 2'] || a['Backup 2'];

          const sObj = schools.find(s => s.id === sName || s.name === sName);
          const pObj = teachers.find(t => t.id === pName || t.name === pName);
          const b1Obj = teachers.find(t => t.id === b1Name || t.name === b1Name);
          const b2Obj = teachers.find(t => t.id === b2Name || t.name === b2Name);

          return {
            s: sObj ? sObj.id : sName,
            p: pObj ? pObj.id : (pName||''),
            b: b1Obj ? b1Obj.id : (b1Name||''),
            b2: b2Obj ? b2Obj.id : (b2Name||'')
          };
        });
        sv('ms_a', finalAssigns);
      }

      // 4. Absences resolution
      if (absences && teachers) {
        const finalAbs = absences.map(ab => {
          const tName = ab.tid || ab['Teacher Name'];
          const tObj = teachers.find(t => t.id === tName || t.name === tName);
          return {
            dateFrom: ab.dateFrom || ab['Date From'] || '',
            dateTo: ab.dateTo || ab['Date To'] || '',
            tid: tObj ? tObj.id : tName,
            status: ab.status || ab['Leave Type'] || 'Leave',
            reason: ab.reason || ab.Reason || ''
          };
        });
        sv('ms_abs', finalAbs);
      }

      // 5. Holidays resolution
      if (holidays && schools) {
        const finalHols = holidays.map(h => {
          const sName = h.sid || h['School Name'];
          const sObj = schools.find(s => s.id === sName || s.name === sName);
          return {
            dateFrom: h.dateFrom || h['Date From'] || '',
            dateTo: h.dateTo || h['Date To'] || '',
            sid: (sName === 'ALL' || !sObj) ? 'ALL' : sObj.id,
            label: h.label || h.Label || 'Holiday'
          };
        });
        sv('ms_hols', finalHols);
      }

      if (company && company[0]) {
        const c = company[0];
        sv('ms_company', {
          name: c.name || c['Company Name'] || 'My Schedule',
          address: c.address || c.Address || ''
        });
      }

      alert('✅ Data restored from XLSX successfully with Smart Name matching!');
      render();
    } catch(err) {
      console.error(err);
      alert('Error reading XLSX file: ' + err.message);
    }
  };
  reader.readAsArrayBuffer(file);
  input.value = '';
}

function resetAllData() {
  const conf = document.getElementById('delete-all-confirm').value;
  if (conf !== 'DELETE ALL') {
    alert('Please type DELETE ALL in the box to confirm.');
    return;
  }
  if (!confirm('🚨 CRITICAL WARNING: This will erase EVERYTHING (Schools, Teachers, Assignments, Groups, Login). This cannot be undone.\n\nContinue?')) return;
  
  // Save empty arrays so default data does NOT repopulate
  sv('ms_schools', []);
  sv('ms_t', []);
  sv('ms_a', []);
  sv('ms_abs', []);
  sv('ms_hols', []);

  // Clear ALL other ms_ keys (including login credentials, sessions, UI states)
  const toRemove = [];
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    if (k && k.startsWith('ms_') && k !== 'ms_schools' && k !== 'ms_t' && k !== 'ms_a' && k !== 'ms_abs' && k !== 'ms_hols') {
      toRemove.push(k);
    }
  }
  toRemove.forEach(k => localStorage.removeItem(k));

  // Force empty groups so default ['Group 1'...] does NOT repopulate
  sv('ms_group_names', []);

  // Mark as fresh setup so login screen shows setup hint
  localStorage.setItem('ms_first_setup', '1');

  alert('💥 All data cleared.\n\nLogin with default credentials:\n👤 Username: admin\n🔑 Password: admin\n\nPlease change your password after logging in.');
  location.reload();
}

// SERVICE WORKER
// ═══════════════════════════════════════════════════════════
if ('serviceWorker' in navigator) {
  const code = `
    const C='ms-v2';
    self.addEventListener('install',e=>{self.skipWaiting();});
    self.addEventListener('activate',e=>{e.waitUntil(clients.claim())});
    self.addEventListener('fetch',e=>{e.respondWith(fetch(e.request).catch(()=>new Response('<h1>Offline</h1>',{headers:{'Content-Type':'text/html'}})))});
  `;
  const blob = new Blob([code],{type:'application/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
}

// ── LIST RENDERS ──────────────────────────────────────────
function renderTList() {
  const teachers = getT();
  const filtered = S.searchTeacher
    ? teachers.filter(t=>t.name.toLowerCase().includes(S.searchTeacher.toLowerCase())||t.id.toLowerCase().includes(S.searchTeacher.toLowerCase()))
    : teachers;
  return filtered.map((t,i)=>{
    const realIdx = teachers.indexOf(t);
    return `<div class="li">
      <div class="li-info">
        <div class="li-name">${t.name}</div>
        <div class="li-sub">${t.id} • 📱 ${t.mobile}</div>
      </div>
      <div style="display:flex;gap:4px">
        <button onclick="editTeacher(${realIdx})" class="edit-btn">Edit</button>
        <button onclick="delTeacher(${realIdx})" class="del">×</button>
      </div>
    </div>`;
  }).join('');
}

function renderSList() {
  const schools = getSchools();
  const gn = getGroupNames();
  const filtered = S.searchSchool
    ? schools.filter(s=>s.name.toLowerCase().includes(S.searchSchool.toLowerCase())||s.id.toLowerCase().includes(S.searchSchool.toLowerCase()))
    : schools;
  return filtered.map((sc,i)=>{
    const realIdx = schools.indexOf(sc);
    return `<div class="li">
      <div class="li-info">
        <div class="li-name">${sc.name}</div>
        <div class="li-sub">${sc.id} • ${sc.sunHol?'Sun Holiday':'Sun Working'} • ${gn[sc.group-1] || 'No Group'}</div>
      </div>
      <div style="display:flex;gap:4px;align-items:center">
        <span class="priority-badge priority-${sc.priority}">${sc.priority}</span>
        <button onclick="editSchool(${realIdx})" class="edit-btn">Edit</button>
        <button onclick="delSchool(${realIdx})" class="del">×</button>
      </div>
    </div>`;
  }).join('');
}

function viewDashDetail(date, sid) {
  const sch = calcSchedule(date);
  const item = sch.find(x => x.school.id === sid);
  if (!item) return;
  
  const typeFull = {
    N: 'Normal (Primary Teacher)',
    R: 'Replacement (Backup Duty)',
    H: 'Holiday / Closed',
    U: 'Unassigned (No Teacher Available)'
  };
  
  let details = '';
  if (item.type === 'R') {
    const assigns = getA();
    const a = assigns.find(x => x.s === sid);
    const pT = getT().find(t => t.id === (a?.p));
    const subType = item.teacher.id === a?.b ? 'Backup 1' : 'Backup 2';
    details = `
      <div class="alert" style="background:var(--bll); border-color:var(--bl); margin-bottom:12px">
        <div class="alert-ttl" style="color:var(--bl)">REPLACEMENT INFO</div>
        <div class="alert-txt">
          Primary Teacher <b>${pT?.name||'—'}</b> is absent.<br>
          Assigned <b>${item.teacher.name}</b> as <b>${subType}</b>.
        </div>
      </div>
    `;
  }

  openModal(`
    <div class="modal-title">Assignment Details <button class="modal-close" onclick="closeModal()">✕</button></div>
    <div style="text-align:center; margin-bottom:20px">
      <div style="font-size:18px; font-weight:800; color:var(--g)">${item.school.name}</div>
      <div style="font-size:12px; color:var(--tx2)">${fmtLong(date)}</div>
    </div>
    
    <div class="card" style="box-shadow:none; border:1.5px solid var(--bd)">
      <div class="card-body" style="padding-top:12px">
        <div class="fg"><label class="fl">Status</label>
          <span class="badge badge-${item.type}" style="font-size:12px">${typeFull[item.type]}</span>
        </div>
        ${item.teacher ? `
          <div class="fg"><label class="fl">Assigned Teacher</label>
            <div style="font-weight:700; font-size:15px">${item.teacher.name}</div>
            <div style="font-size:12px; color:var(--tx2)">ID: ${item.teacher.id} • 📱 ${item.teacher.mobile}</div>
          </div>
          <a class="wa-group" href="${waLink(item.teacher.mobile, buildMsg(item))}" target="_blank" style="margin-top:10px">📲 Send WhatsApp Message</a>
        ` : ''}
        ${details}
        ${item.type === 'H' ? `<div class="fg"><label class="fl">Note</label><div style="font-size:13px">${item.note||'School Holiday'}</div></div>` : ''}
      </div>
    </div>
    <button class="btn btn-s" onclick="closeModal()">Close</button>
  `);
}

window.onerror = function(msg, url, line) {
  alert("App Error: " + msg + "\nLine: " + line);
};

document.addEventListener('DOMContentLoaded', () => {
  try {
    render();
  } catch (e) {
    alert("Startup Error: " + e.message);
    console.error(e);
  }
});
</script>
</body>
